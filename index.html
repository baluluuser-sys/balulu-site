
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALULU</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #050505;
    color: white;
    font-family: 'Inter', sans-serif;
}

/* SIDE MENU */
.menu {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 200px;
    background: #0a0a0a;
    border-right: 2px solid #ff6a00;
    padding-top: 60px;
}

.menu a {
    display: block;
    padding: 15px 25px;
    color: #ccc;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    color: #ff6a00;
}

/* HERO */
.hero {
    margin-left: 200px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 60px;
    border-left: 2px solid #ff6a00;
}

.hero h1 {
    font-family: 'Cinzel', serif;
    font-size: 80px;
    margin: 0;
    letter-spacing: 5px;
}

.hero p {
    color: #aaa;
    font-size: 22px;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: 1px solid #ff6a00;
    color: #ff6a00;
    text-decoration: none;
    width: fit-content;
}

.btn:hover {
    background: #ff6a00;
    color: black;
}

/* SECTION */
.section {
    margin-left: 200px;
    padding: 80px 60px;
    border-left: 2px solid #ff6a00;
}

/* PRODUCTS */
.products {
    display: flex;
    gap: 30px;
}

.card img {
    width: 100%;
    border: 2px solid #ff6a00;
}

/* FOOTER */
footer {
    margin-left: 200px;
    text-align: center;
    padding: 40px;
    border-top: 1px solid #222;
    color: #777;
}

</style>
</head>

<body>

<div class="menu">
<a href="#">Home</a>
<a href="#">Collection</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

<section class="hero">
<h1>BALULU</h1>
<p>Between reality and imagination</p>
<a href="#" class="btn">Explore</a>
</section>

<section class="section">
<h2>Collection</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/400x500">
<h3>Genesis</h3>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x500">
<h3>Phantom</h3>
</div>

</div>
</section>

<footer>
© BALULU — Luxury Vision
</footer>

</body>
</html>
